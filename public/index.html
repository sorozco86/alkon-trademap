<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ALKON TradeMap</title><link rel="stylesheet" href="/css/styles.css"><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script defer src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script><script defer src="/js/app.js"></script></head><body><section id="login" class="login"><div class="login-card"><h1>ALKON TradeMap</h1><p>CRM comercial ferretero</p><label>Usuario<input id="loginUser" autocomplete="username" value="admin"></label><label>Contraseña<input id="loginPass" type="password" autocomplete="current-password" value="alkon2026"></label><button id="loginBtn">Ingresar</button><small id="loginMsg"></small></div></section><section id="app" class="hidden"><header><div><h1>ALKON TradeMap</h1><span id="userBadge"></span></div><nav><button data-view="dashboard" class="active">Dashboard</button><button data-view="clientes">Clientes</button><button data-view="mapa">Mapa</button><button data-view="admin" id="adminTab">Admin</button><button id="logoutBtn">Salir</button></nav></header><main><section id="dashboard" class="view"><div class="cards"><div><b id="kTotal">0</b><span>Empresas</span></div><div><b id="kVisited">0</b><span>Visitadas</span></div><div><b id="kPending">0</b><span>Pendientes</span></div><div><b id="kCoverage">0%</b><span>Cobertura</span></div><div><b id="kToday">0</b><span>Visitas hoy</span></div></div><div class="grid"><div class="panel"><h2>Mapa general</h2><div id="miniMap"></div></div><div class="panel"><h2>Resumen por provincia</h2><div id="provinceSummary"></div></div></div></section><section id="clientes" class="view hidden"><div class="toolbar"><input id="search" placeholder="Buscar empresa, provincia o ciudad"><select id="priority"><option value="">Todas las prioridades</option><option>A</option><option>B</option><option>C</option></select><select id="status"><option value="">Todos</option><option value="pending">Pendientes</option><option value="visited">Visitados</option><option value="photo">Con foto</option></select><button id="exportCsv">Exportar CSV</button></div><div id="clientList" class="client-list"></div></section><section id="mapa" class="view hidden"><div class="toolbar"><button id="toggleHeat">Heatmap</button><button id="fitMap">Ver todos</button></div><div id="map"></div></section><section id="admin" class="view hidden"><div class="panel"><h2>Administración</h2><p>Usuarios locales simples. El usuario inicial es <b>admin</b> / <b>alkon2026</b>.</p><div class="user-form"><input id="newUser" placeholder="usuario"><input id="newPass" placeholder="contraseña"><select id="newRole"><option value="vendedor">vendedor</option><option value="supervisor">supervisor</option><option value="admin">admin</option></select><button id="addUser">Agregar usuario</button></div><div id="userList"></div></div></section></main></section><div id="modal" class="modal hidden"><div class="modal-card"><button id="closeModal" class="x">×</button><h2 id="mName"></h2><p id="mMeta"></p><div id="mDetail"></div><label>Estado<select id="visitStatus"><option value="visitado">Visitado</option><option value="seguimiento">Pendiente seguimiento</option><option value="rechazado">Rechazado</option></select></label><label>Observaciones<textarea id="notes" rows="3"></textarea></label><label>Foto<input id="photo" type="file" accept="image/*" capture="environment"></label><img id="preview" class="preview hidden"><button id="saveVisit">Guardar visita con GPS/foto</button></div></div></body></html>

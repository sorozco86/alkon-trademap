<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ALKON TradeMap</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div><strong>ALKON TradeMap</strong><span>CRM ferretero simple</span></div>
    <div class="userbox"><input id="seller" placeholder="Nombre vendedor" /><button id="saveSeller">Guardar</button></div>
  </header>

  <main class="layout">
    <section class="panel">
      <div class="kpis">
        <div><b id="kTotal">0</b><span>Total</span></div>
        <div><b id="kVisited">0</b><span>Visitados</span></div>
        <div><b id="kPending">0</b><span>Pendientes</span></div>
        <div><b id="kCoverage">0%</b><span>Cobertura</span></div>
      </div>

      <div class="filters">
        <input id="search" placeholder="Buscar empresa, provincia o ciudad" />
        <select id="priority"><option value="">Todas las prioridades</option><option>A</option><option>B</option><option>C</option></select>
        <select id="status"><option value="">Todos los estados</option><option value="pending">Pendiente</option><option value="visited">Visitado</option><option value="photo">Visitado con foto</option></select>
        <button id="toggleHeat">Heatmap</button>
        <button id="exportCsv">Exportar CSV</button>
      </div>

      <div id="map"></div>
    </section>

    <aside class="side">
      <h2>Clientes</h2>
      <div id="clientList" class="client-list"></div>
    </aside>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <button id="closeModal" class="close">×</button>
      <h2 id="mName"></h2>
      <p id="mMeta"></p>
      <div class="detail" id="mDetail"></div>
      <label>Estado</label>
      <select id="visitStatus"><option>Visitado</option><option>Pendiente seguimiento</option><option>No interesado</option><option>Cliente activo</option></select>
      <label>Observaciones</label>
      <textarea id="notes" placeholder="Comentarios de la visita"></textarea>
      <label>Foto validación</label>
      <input id="photo" type="file" accept="image/*" capture="environment" />
      <img id="preview" class="preview hidden" />
      <button id="saveVisit" class="primary">Guardar visita con GPS/foto</button>
      <small>La ubicación se pide al guardar. La foto se comprime antes de subir.</small>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  <script src="/app.js"></script>
</body>
</html>
